name: Dev Services Bootstrap

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    environment: dev

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ secrets.GCP_REGION }}
      CLUSTER_NAME: dev-gke
      ARGOCD_NAMESPACE: argocd

    steps:
      - uses: actions/checkout@v5

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v4

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Ensure argocd namespace exists
        run: |
          kubectl apply -f bootstrap/argocd-install.yaml

      - name: Install or upgrade ArgoCD
        run: |
          kubectl apply -n "$ARGOCD_NAMESPACE" --server-side --force-conflicts \
            -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

      - name: Wait for ArgoCD
        run: |
          kubectl rollout status deployment/argocd-server -n "$ARGOCD_NAMESPACE" --timeout=300s
          kubectl rollout status deployment/argocd-repo-server -n "$ARGOCD_NAMESPACE" --timeout=300s
          kubectl rollout status statefulset/argocd-application-controller -n "$ARGOCD_NAMESPACE" --timeout=300s

      - name: Apply root app
        run: |
          kubectl apply -f bootstrap/root-app.yaml -n "$ARGOCD_NAMESPACE"