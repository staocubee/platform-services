name: Dev Destroy Services

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  destroy-services:
    runs-on: ubuntu-latest
    environment: dev

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ secrets.GCP_REGION }}
      CLUSTER_NAME: dev-gke
      ARGOCD_NAMESPACE: argocd

    steps:
      - uses: actions/checkout@v5

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3
      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v4

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Delete root app
        run: |
          kubectl delete -f bootstrap/root-app.yaml -n "$ARGOCD_NAMESPACE" --ignore-not-found=true

      - name: Wait a bit for ArgoCD pruning
        run: sleep 60

      - name: Delete ArgoCD install
        run: |
          kubectl delete -n "$ARGOCD_NAMESPACE" \
            -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml \
            --ignore-not-found=true

      - name: Delete ArgoCD namespace
        run: |
          kubectl delete namespace "$ARGOCD_NAMESPACE" --ignore-not-found=true