name: Dev Destroy Services

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: platform-services-dev
  cancel-in-progress: false

jobs:
  destroy-services:
    runs-on: ubuntu-latest
    environment: dev

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: ${{ secrets.GCP_REGION }}
      CLUSTER_NAME: dev-gke
      ARGOCD_NAMESPACE: argocd

    steps:
      - uses: actions/checkout@v5

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3
      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v4

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Remove ArgoCD app finalizers
        run: |
          kubectl patch application platform-root -n "$ARGOCD_NAMESPACE" \
            -p '{"metadata":{"finalizers":[]}}' --type=merge || true

          kubectl get applications -n "$ARGOCD_NAMESPACE" -o name | \
            xargs -r -I {} kubectl patch {} -n "$ARGOCD_NAMESPACE" \
            -p '{"metadata":{"finalizers":[]}}' --type=merge || true

      - name: Delete root app
        run: |
          kubectl delete -f bootstrap/root-app.yaml -n "$ARGOCD_NAMESPACE" --ignore-not-found=true

      - name: Delete child apps
        run: |
          kubectl get applications -n "$ARGOCD_NAMESPACE" -o name | \
            xargs -r kubectl delete -n "$ARGOCD_NAMESPACE" --ignore-not-found=true

      - name: Wait for ArgoCD pruning
        run: sleep 60

      - name: Delete ArgoCD install
        run: |
          kubectl delete -k bootstrap/argocd --ignore-not-found=true

      - name: Delete ArgoCD namespace
        run: |
          kubectl delete namespace "$ARGOCD_NAMESPACE" --ignore-not-found=true