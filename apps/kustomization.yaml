apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - argocd-install.yaml

namespace: argocd

patches:
  - target:
      kind: Deployment
      name: argocd-server
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: "--insecure"

configMapGenerator:
  - name: argocd-cm
    behavior: merge
    literals:
      - url=https://argocd.136.115.108.14.nip.io