apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - argocd-install.yaml

namespace: argocd

patches:
  # 1. The URL Patch (Safe for ConfigMap)
  - target:
      kind: ConfigMap
      name: argocd-cm
    patch: |-
      - op: add
        path: /data/url
        value: "https://argocd.136.115.108.14.nip.io"

  # 2. The Insecure Patch (Crucial for the 307 error)
  - target:
      kind: Deployment
      name: argocd-server
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: "--insecure"