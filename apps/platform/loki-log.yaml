apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default

  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/template/spec/containers/*/resources
        - /spec/template/spec/initContainers/*/resources
        - /spec/template/spec/tolerations
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/spec/containers/*/resources
        - /spec/template/spec/initContainers/*/resources
        - /spec/template/spec/tolerations

  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.27.0
    helm:
      values: |
        deploymentMode: SingleBinary

        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
          schemaConfig:
            configs:
              - from: "2024-04-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h

        singleBinary:
          replicas: 1
          persistence:
            enabled: true
            size: 10Gi

          resources:
            requests:
              cpu: 500m
              memory: 2Gi
              ephemeral-storage: 1Gi
            limits:
              ephemeral-storage: 1Gi

        read:
          replicas: 0
        write:
          replicas: 0
        backend:
          replicas: 0

        gateway:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: logging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true