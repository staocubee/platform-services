apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promtail
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: promtail
    targetRevision: 6.16.6
    helm:
      values: |
        fullnameOverride: promtail

        daemonset:
          enabled: true

        deployment:
          enabled: false

        config:
          clients:
            - url: http://loki.logging.svc.cluster.local:3100/loki/api/v1/push

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
            ephemeral-storage: 1Gi
          limits:
            memory: 256Mi
            ephemeral-storage: 1Gi

        tolerations:
          - key: kubernetes.io/arch
            operator: Equal
            value: amd64
            effect: NoSchedule

  destination:
    server: https://kubernetes.default.svc
    namespace: logging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true