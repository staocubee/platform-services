apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: platform-routing
  namespace: istio-system
spec:
  hosts:
    - "argocd.35.223.57.54.nip.io"
    - "grafana.35.223.57.54.nip.io"
    - "nexus.35.223.57.54.nip.io"
  gateways:
    - istio-system/platform-gateway
  http:
    - match:
        - uri:
            prefix: /  # Match everything
      route:
        - destination:
            host: argocd-server.argocd.svc.cluster.local
            port:
              number: 80

    - match:
        - authority:
            exact: "grafana.35.223.57.54.nip.io"
      route:
        - destination:
            host: monitoring-grafana.monitoring.svc.cluster.local
            port:
              number: 80

    - match:
        - authority:
            exact: "nexus.35.223.57.54.nip.io"
      route:
        - destination:
            host: nexus-nexus-repository-manager.nexus.svc.cluster.local
            port:
              number: 8081